name: PR Benchmark

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-bench-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  compare:
    name: A/B benchmark (base vs head)
    runs-on: ubuntu-latest
    steps:
      # Head (the PR merge commit) in the default path, base in ./base —
      # both run on the same machine so the hardware is controlled and the
      # diff reflects the code/dependency change.
      - uses: actions/checkout@v7.0.1

      - uses: actions/checkout@v7.0.1
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - uses: pnpm/action-setup@v6.0.9

      - uses: actions/setup-node@v7.0.0
        with:
          node-version: "24.18.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm fmt:check

      - name: Bench head
        run: node src/runner/bench.ts --quick --out /tmp/head.json

      - name: Bench base
        run: |
          if [ -f base/src/runner/bench.ts ]; then
            cd base
            # Fall back to npm for base commits that predate the pnpm switch.
            if [ -f pnpm-lock.yaml ]; then
              pnpm install --frozen-lockfile
            else
              npm ci
            fi
            node src/runner/bench.ts --quick --out /tmp/base.json
          else
            echo "base has no benchmark runner — reporting head-only numbers"
          fi

      - name: Validate head against baselines
        run: node src/runner/validate.ts

      # --baseline is the committed reference (baselines/perf.json), regenerated
      # by the perf-baseline workflow. Absent until first generated, in which
      # case compare.ts simply omits the drift section.
      - name: Build comparison comment
        run: |
          node src/runner/compare.ts /tmp/base.json /tmp/head.json \
            --out /tmp/comment.md \
            ${{ hashFiles('baselines/perf.json') != '' && '--baseline baselines/perf.json' || '' }}

      - name: Post sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v3.0.5
        with:
          header: benchmark-comparison
          path: /tmp/comment.md
